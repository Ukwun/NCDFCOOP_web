# Netlify Configuration for NCDF COOP Commerce Web
# Automatic deployment settings from GitHub
# Last deployment trigger: 2026-04-07

[build]
  # Build command - remove node_modules, clear cache, reinstall all deps, then build
  # This ensures TypeScript and all dependencies are fully installed from lock file
  command = "rm -rf node_modules && npm cache clean --force && npm install --prefer-offline && npm run build"
  
  # Directory with the built site (Next.js output)
  publish = ".next"

[build.environment]
  # Node.js version for Netlify build
  NODE_VERSION = "20"
  
  # Environment variables are set in Netlify dashboard
  # Required variables:
  # - All NEXT_PUBLIC_* variables
  # - SENTRY_AUTH_TOKEN
  # - SENTRY_ENVIRONMENT
  # - NODE_ENV

[functions]
  # Next.js functions configuration
  directory = ".next/server"

# Rewrite rules for Next.js routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache settings
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Production context
[context.production]
  command = "rm -rf node_modules && npm cache clean --force && npm install --prefer-offline && npm run build"
  publish = ".next"
  environment = { NODE_ENV = "production" }

# Preview context (for PR previews)
[context.deploy-preview]
  command = "rm -rf node_modules && npm cache clean --force && npm install --prefer-offline && npm run build"
  publish = ".next"

# Branch preview context
[context.branch-preview]
  command = "rm -rf node_modules && npm cache clean --force && npm install --prefer-offline && npm run build"
  publish = ".next"
